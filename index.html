    font-family:'Fredoka','Baloo 2',sans-serif;
    background:linear-gradient(180deg,#87CEEB 0%,#A8D8F0 25%,#FFD580 60%,#A8E6A3 100%);
    background-attachment:fixed;
    height:100vh;
    width:100vw;
    overflow:hidden;
    touch-action:none;
    color:#2a2a2a;
    position:relative;
  }
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:
      radial-gradient(ellipse 80px 30px at 12% 12%,rgba(255,255,255,0.85),transparent 70%),
      radial-gradient(ellipse 100px 35px at 85% 8%,rgba(255,255,255,0.85),transparent 70%),
      radial-gradient(ellipse 70px 25px at 25% 28%,rgba(255,255,255,0.7),transparent 70%),
      radial-gradient(ellipse 90px 30px at 78% 35%,rgba(255,255,255,0.7),transparent 70%),
      radial-gradient(ellipse 60px 20px at 15% 50%,rgba(255,255,255,0.6),transparent 70%);
    animation:driftClouds 60s linear infinite;
  }
  @keyframes driftClouds{0%{transform:translateX(0);}100%{transform:translateX(-30px);}}

  #app{
    max-width:480px;margin:0 auto;height:100vh;
    display:flex;flex-direction:column;
    position:relative;z-index:1;
  }

  /* --- TOP PANEL --- */
  #top-panel {
    background:rgba(255,255,255,0.85);
    backdrop-filter:blur(10px);
    border-bottom:4px solid rgba(255,200,0,0.6);
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
    z-index:30;
  }

  #title-row {
    display:flex; justify-content:space-between; align-items:center;
    padding:8px 12px;
  }

  #title-banner{
    font-family:'Baloo 2',sans-serif;font-weight:800;
    font-size:20px;color:#fff;
    text-shadow:2px 3px 0 rgba(0,0,0,0.2),0 0 20px rgba(255,200,0,0.4);
    letter-spacing:0.5px;
    animation:wobble 3s ease-in-out infinite;
  }
  @keyframes wobble{0%,100%{transform:rotate(-1.5deg);}50%{transform:rotate(1.5deg);}}

  .fs-btn {
    background:#fff; border:2px solid #ccc; border-radius:12px;
    width:36px; height:36px; font-size:16px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 3px 0 rgba(0,0,0,0.1);
  }
  .fs-btn:active { transform:translateY(2px); box-shadow:0 1px 0 rgba(0,0,0,0.1); }

  /* Accordion Content Wrapper */
  #panel-content {
    overflow: hidden;
    max-height: 400px;
    opacity: 1;
    transition: max-height 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s ease;
  }
  #panel-content.collapsed {
    max-height: 0;
    opacity: 0;
    pointer-events: none;
  }
  .panel-inner-pad { padding-bottom: 12px; }

  /* Settings Row */
  #settings-bar {
    display:flex; flex-direction:column; gap:12px; padding:4px 16px 12px;
  }
  
  #btn-toggle-stars {
    padding:6px 18px; border-radius:18px; border:2px solid #FFD700; 
    background:#FFFDE7; color:#B8860B; font-family:'Baloo 2'; 
    font-weight:800; font-size:14px; box-shadow:0 3px 0 rgba(0,0,0,0.1); 
    cursor:pointer; transition:all 0.2s; align-self: center;
  }
  #btn-toggle-stars:active { transform:translateY(2px); box-shadow:0 1px 0 rgba(0,0,0,0.1); }
  #btn-toggle-stars.off { border-color:#ccc; background:#f5f5f5; color:#888; }

  #delay-row {
    display:flex; align-items:center; gap:12px; justify-content:center;
    background:rgba(0,0,0,0.04); padding:8px 16px; border-radius:16px;
  }
  #delay-row .label {
    font-family:'Baloo 2'; font-size:13px; font-weight:700; color:#555; white-space:nowrap;
  }
  #delay-slider { flex:1; max-width: 150px; cursor:pointer; height:6px; accent-color:#FF6B6B; }
  #delay-val {
    font-family:'Baloo 2'; font-size:14px; font-weight:800; color:#555;
    min-width:30px; text-align:right;
  }

  #controls{display:flex;justify-content:space-evenly;align-items:center;gap:10px;padding:4px 12px 10px;}
  .ctrl-btn{
    background:#fff;border:3px solid #fff;border-radius:50%;
    width:48px;height:48px;font-size:20px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 0 rgba(0,0,0,0.15);
    transition:all 0.15s;font-family:inherit;
  }
  .ctrl-btn:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,0.15);}
  .ctrl-btn:disabled{opacity:0.4;cursor:default;}
  #btn-speak{
    width:64px;height:64px;font-size:28px;border:4px solid #fff;color:#fff;
    box-shadow:0 5px 0 rgba(0,0,0,0.2),0 8px 20px rgba(255,200,0,0.4);
    animation:pulseGlow 2s ease-in-out infinite;
  }
  @keyframes pulseGlow{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
  #btn-autoplay.playing{background:#2ECC71!important;border-color:#fff!important;color:#fff!important;}

  #header{
    margin:0 12px;padding:8px 14px;border-radius:16px;
    box-shadow:inset 0 2px 5px rgba(0,0,0,0.05);
    border:2px solid rgba(255,255,255,0.4);
    transition:background 0.4s;
  }
  #header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  #cat-label{font-family:'Baloo 2';font-size:13px;font-weight:800;text-shadow:1px 1px 0 rgba(0,0,0,0.15);}
  #progress-text{
    font-family:'Baloo 2';font-size:15px;font-weight:800;
    background:rgba(255,255,255,0.3);padding:2px 10px;border-radius:16px;
    border:1px solid rgba(255,255,255,0.5);
    text-shadow:1px 1px 0 rgba(0,0,0,0.15);
  }
  
  /* --- CUSTOM SPORT SLIDER --- */
  #sport-slider {
    -webkit-appearance: none;
    width: 100%;
    height: 12px;
    border-radius: 20px;
    background: rgba(0,0,0,0.18);
    outline: none;
    border: 1px solid rgba(255,255,255,0.4);
    cursor: pointer;
  }
  #sport-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
    border: 3px solid currentColor;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
  }
  #sport-slider::-moz-range-thumb {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
    border: 3px solid currentColor;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
  }

  /* --- MAIN CONTENT AREA --- */
  #main-content {
    flex:1;
    display:flex;
    flex-direction:column;
    overflow-y:auto;
    padding:12px 16px;
    -webkit-overflow-scrolling:touch;
  }
  #main-content::-webkit-scrollbar { display:none; }

  #card-wrap{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.2s;
  }
  
  #card{
    background:#fff;border-radius:32px;overflow:hidden;
    border:5px solid;
    box-shadow:0 8px 0 rgba(0,0,0,0.12),0 14px 36px rgba(0,0,0,0.18);
    position:relative;
    width:100%;
    max-height:100%;
    display: flex;
    flex-direction: column;
    transition:border-color 0.4s;
  }
  #card::before{content:"⭐";position:absolute;top:-12px;right:24px;font-size:32px;animation:sparkle 1.8s ease-in-out infinite;z-index:5;}
  #card::after{content:"✨";position:absolute;bottom:18px;left:14px;font-size:24px;opacity:0.6;animation:sparkle 2.2s ease-in-out infinite reverse; z-index: 5;}

  #card-text-area { background: #fff; padding-bottom: 8px; z-index: 2; }
  #card-top{padding:10px 18px 4px;display:flex;justify-content:space-between;align-items:center;}
  #card-num{font-family:'Baloo 2';font-size:14px;font-weight:800;letter-spacing:0.5px;background:rgba(0,0,0,0.05);padding:2px 8px;border-radius:10px;}
  #card-batch{font-size:12px;color:#888;font-weight:800;background:rgba(0,0,0,0.05);padding:2px 8px;border-radius:10px;}

    font-size:36px;line-height:1.1;
    color:#1a1a1a;
    text-shadow:2px 2px 0 rgba(0,0,0,0.08);
  }
  #card-country{text-align:center;padding:0 16px 8px;}
  #country-pill{

    border:3px solid;border-radius:30px;padding:6px 20px;
    font-family:'Baloo 2';font-size:18px;font-weight:800;
    box-shadow:0 4px 0 rgba(0,0,0,0.12);
    transition:all 0.3s;

  #card-img-wrap {
    text-align:center; padding: 0; width: 100%; flex: 1; 
  }
  #card-sprite {
    width: 100%; padding-top: 133%; 
    border-radius: 0 0 26px 26px; overflow: hidden;
    position: relative; display: block;
    box-shadow: inset 0 4px 15px rgba(0,0,0,0.1); border-top: 4px solid #fff;
  }
  #card-sprite img {
    position: absolute; top: 0; left: 0; max-width: none;
    display: block; width: 500%; height: 200%; 
  }
  #card-emoji{font-size:120px;line-height:1;display:inline-block;animation:emojiBounce 2.4s ease-in-out infinite;filter:drop-shadow(3px 5px 0 rgba(0,0,0,0.12));}
  
  #hint{
    text-align:center;padding:10px 0;
    font-family:'Baloo 2';font-size:14px;font-weight:700;color:#fff;
    text-shadow:1px 1px 0 rgba(0,0,0,0.3); opacity:0.9;
  }

  /* Star Shower Animations */
  #confetti{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden;display:none;}
  .cf{position:absolute;font-size:48px; filter:drop-shadow(0 0 10px rgba(255,215,0,0.8));}
  @keyframes cffall{
    0%{transform:translateY(-10vh) rotate(0deg) scale(0.5);opacity:1;}
    50%{transform:scale(1.2);}
    100%{transform:translateY(110vh) rotate(720deg) scale(1);opacity:0;}
  }
</style>
</head>

<div id="app">
  
  <div id="top-panel">
    <div id="title-row">
      <div id="title-banner">🏆 SPORTS HEROES</div>
      <div style="display:flex; gap:8px;">
        <button class="fs-btn" id="btn-toggle-panel" onclick="toggleAccordion()">🔼</button>
        <button class="fs-btn" onclick="toggleFullScreen()">⛶</button>
      </div>
    </div>

    <div id="panel-content">
      <div class="panel-inner-pad">
        
        <div id="settings-bar">
          <button id="btn-toggle-stars" onclick="toggleStars()">✨ Star Shower: ON</button>
          
          <div id="delay-row">
            <span class="label">⏱ Autoplay Speed</span>
            <input type="range" id="delay-slider" min="2" max="10" step="1" value="4" oninput="onDelayChange(this.value)">
            <span id="delay-val">4s</span>
          </div>
        </div>

        <div id="controls">
          <button class="ctrl-btn" id="btn-prev" onclick="go(-1)">⬆️</button>
          <button class="ctrl-btn" id="btn-speak" onclick="speakCard()">🔊</button>
          <button class="ctrl-btn" id="btn-autoplay" onclick="toggleAutoPlay()">▶️</button>
          <button class="ctrl-btn" id="btn-next" onclick="go(1)">⬇️</button>
        </div>

        <div id="header">
          <div id="header-row">
            <span id="cat-label"></span>
            <span id="progress-text"></span>
          </div>
          <!-- INTERACTIVE SLIDER INSTEAD OF STATIC PROGRESS BAR -->
          <input type="range" id="sport-slider" min="1" max="100" value="1" oninput="jumpToSport(this.value)">
        </div>
      </div>
    </div>
  </div>

  <div id="main-content">
    <div id="card-wrap">
      <div id="card">
        <div id="card-text-area">
          <div id="card-top">
            <span id="card-num"></span>
            <span id="card-batch"></span>
          </div>
          <div id="card-sport"></div>
          <div id="card-country"><div id="country-pill"></div></div>
        </div>
        <div id="card-img-wrap"></div>
      </div>
    </div>
    
    <div id="hint">👆 Swipe Up/Down • Tap 🔊 to hear</div>
  </div>

  <div id="confetti"></div>
</div>

  3:"https://raw.githubusercontent.com/gokulkrishnan1293/ibrcimg/main/batch3.png",
  4:"https://raw.githubusercontent.com/gokulkrishnan1293/ibrcimg/main/batch4.png",
  5:"https://raw.githubusercontent.com/gokulkrishnan1293/ibrcimg/main/batch5.png",
  6:"https://raw.githubusercontent.com/gokulkrishnan1293/ibrcimg/main/batch6.png",
  7:"https://raw.githubusercontent.com/gokulkrishnan1293/ibrcimg/main/batch7.png",
  8:"https://raw.githubusercontent.com/gokulkrishnan1293/ibrcimg/main/batch8.png",
  9:"https://raw.githubusercontent.com/gokulkrishnan1293/ibrcimg/main/batch9.png",
  10:"https://raw.githubusercontent.com/gokulkrishnan1293/ibrcimg/main/batch10.png"
};

const CAT={
  "Traditional & Popular":{bg:"#FF6B6B",dark:"#C0392B"},
  "Asian Origin":         {bg:"#FF9F43",dark:"#E67E22"},
  "Combat Sports":        {bg:"#E74C3C",dark:"#922B21"},
  "Water Sports":         {bg:"#3498DB",dark:"#1A5276"},
  "Winter Sports":        {bg:"#5DADE2",dark:"#2471A3"},
  "Athletics & Track":    {bg:"#27AE60",dark:"#1A8A4A"},
  "Indoor Sports":        {bg:"#9B59B6",dark:"#6C3483"},
  "Adventure Sports":     {bg:"#E91E63",dark:"#880E4F"},
  "Team & Other":         {bg:"#1ABC9C",dark:"#0E6655"},
  "Traditional World":    {bg:"#F39C12",dark:"#9A7D0A"},
};

let idx=0, autoPlay=false, delay=4, enableStars=true;
let autoTimer=null;
let touchStartY = null;

function toggleAccordion() {
  const content = document.getElementById("panel-content");
  const btn = document.getElementById("btn-toggle-panel");
  if(content.classList.contains("collapsed")){
    content.classList.remove("collapsed");
    btn.textContent = "🔼";
  } else {
    content.classList.add("collapsed");
    btn.textContent = "🔽";
  }
}

function toggleFullScreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(err => {
      console.log(`Error enabling fullscreen: ${err.message}`);
    });
  } else {
    if (document.exitFullscreen) {
      document.exitFullscreen();
    }
  }
}

function toggleStars() {
  enableStars = !enableStars;
  const btn = document.getElementById("btn-toggle-stars");
  if(enableStars) {
    btn.textContent = "✨ Star Shower: ON";
    btn.classList.remove("off");
  } else {
    btn.textContent = "❌ Star Shower: OFF";
    btn.classList.add("off");
  }
}

function onDelayChange(v) {
  delay = parseInt(v);
  document.getElementById("delay-val").textContent = `${delay}s`;
}

// Jump directly to a card using the slider
function jumpToSport(val) {
  const targetIdx = parseInt(val) - 1;
  if (targetIdx === idx) return;
  
  const wrap = document.getElementById("card-wrap");
  wrap.style.transition = "opacity 0.15s";
  wrap.style.opacity = "0";
  
  setTimeout(() => {
    idx = targetIdx;
    render();
    wrap.style.opacity = "1";
    // Optional: Speak the card immediately when jumping
    // speakCard(); 
  }, 150);
}

function render(){
  const cur=SPORTS[idx];
  const cs=CAT[cur.cat]||CAT["Traditional & Popular"];
  const batchNum=Math.ceil(cur.n/10);
  const batchUrl=BATCH_IMAGES[batchNum];

  const hdr=document.getElementById("header");
  hdr.style.background=`linear-gradient(135deg,${cs.bg},${cs.dark})`;
  document.getElementById("cat-label").textContent=cur.cat.toUpperCase();
  document.getElementById("cat-label").style.color="#fff";
  document.getElementById("progress-text").textContent=`${idx+1} / 100`;
  document.getElementById("progress-text").style.color="#fff";
  
  // Update the new slider
  const slider = document.getElementById("sport-slider");
  slider.value = idx + 1;
  const pct = (idx / 99) * 100;
  // Dynamic gradient so the "filled" part matches the category color
  slider.style.background = `linear-gradient(90deg, #fff ${pct}%, rgba(0,0,0,0.18) ${pct}%)`;
  slider.style.color = cs.dark; // Inherits to the thumb border

  const card=document.getElementById("card");
  card.style.borderColor=cs.bg;
  document.getElementById("card-num").textContent=`⭐ SPORT #${cur.n}`;
  document.getElementById("card-num").style.color=cs.dark;
  document.getElementById("card-batch").textContent=`Level ${batchNum}/10`;

  const imgWrap=document.getElementById("card-img-wrap");
  if(batchUrl){
    const i=(cur.n-1)%10, col=i%5, row=Math.floor(i/5);
    imgWrap.innerHTML=`
      <div id="card-sprite" style="border-top-color:${cs.bg};">
        <img src="${batchUrl}" crossorigin="anonymous" style="transform: translate(-${col * 20}%, -${row * 50}%);">
      </div>`;
  } else {
    imgWrap.innerHTML=`<div style="padding:60px 0 20px;"><span id="card-emoji">${cur.e}</span></div>`;
  }

  const sportEl=document.getElementById("card-sport");
  sportEl.textContent=cur.sport;
  sportEl.style.color=cs.dark;

  const pill=document.getElementById("country-pill");
  pill.textContent=`🌍 ${cur.origin}`;
  pill.style.background=`linear-gradient(135deg,${cs.bg}22,${cs.bg}44)`;
  pill.style.borderColor=cs.bg;
  pill.style.color=cs.dark;

  document.getElementById("btn-prev").disabled=idx===0;
  document.getElementById("btn-speak").style.background=`linear-gradient(135deg,${cs.bg},${cs.dark})`;
  
  const apBtn=document.getElementById("btn-autoplay");
  if(autoPlay){
    apBtn.classList.add("playing");
    apBtn.textContent="⏸️";
  } else {
    apBtn.classList.remove("playing");
    apBtn.textContent="▶️";
  }
}

function go(dir){
  const next=Math.max(0,Math.min(99,idx+dir));
  if(next===idx)return;
  
  const wrap=document.getElementById("card-wrap");
  wrap.style.transform = `translateY(${dir > 0 ? '-50px' : '50px'})`;
  wrap.style.opacity = "0";
  
  setTimeout(()=>{
    idx=next;
    render();
    
    wrap.style.transition = "none";
    wrap.style.transform = `translateY(${dir > 0 ? '50px' : '-50px'})`;
    wrap.offsetHeight; 
    wrap.style.transition = "transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.2s";
    
    wrap.style.transform = "translateY(0)";
    wrap.style.opacity = "1";

    // Trigger stars every 5th card when moving forward
    if ((idx + 1) % 5 === 0 && dir > 0) {
      starShower();
    }
  }, 200);
}

function speak(txt){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(txt);
  u.rate=0.82;u.pitch=1.2;u.volume=1;
  speechSynthesis.speak(u);
}
function speakCard(){speak(`${SPORTS[idx].sport}. ${SPORTS[idx].origin}.`);}

function toggleAutoPlay(){
  autoPlay=!autoPlay;
  clearTimeout(autoTimer);
  if(autoPlay){speakCard();scheduleNext();}
  render();
}
function scheduleNext(){
  if(!autoPlay)return;
  autoTimer=setTimeout(()=>{
    if(idx<99){
      go(1);
      setTimeout(()=>{if(autoPlay){speakCard();scheduleNext();}},400);
    } else {
      autoPlay=false;
      render();
    }
  },delay*1000);
}

function starShower(){
  if(!enableStars) return;
  const el=document.getElementById("confetti");
  const items=["⭐","🌟","✨"];
  el.innerHTML=Array.from({length:20},(_,i)=>{
    const sym=items[Math.floor(Math.random()*items.length)];
    const left=Math.random()*100;
    const dur=1.2+Math.random()*1;
    const dly=Math.random()*0.3;
    return `<div class="cf" style="left:${left}%;animation:cffall ${dur}s ease-in ${dly}s both;">${sym}</div>`;
  }).join("");
  el.style.display="block";
  setTimeout(()=>{el.style.display="none";el.innerHTML="";},2500);
}

// Vertical Swipe Logic
document.addEventListener("touchstart", e => { 
  touchStartY = e.touches[0].clientY; 
}, {passive: true});

document.addEventListener("touchend", e => {
  if (touchStartY === null) return;
  const d = touchStartY - e.changedTouches[0].clientY;
  
  if (Math.abs(d) > 55) {
    go(d > 0 ? 1 : -1);
    setTimeout(speakCard, 350); 
  }
  touchStartY = null;
});

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowDown") go(1);
  else if(e.key==="ArrowUp") go(-1);
  else if(e.key===" "){e.preventDefault();speakCard();}
});

render();
</script>
</body>
</html>
